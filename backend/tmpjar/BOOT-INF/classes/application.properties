# Database Configuration (PlanetScale / Managed MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/ai_insurance
spring.datasource.username=root
spring.datasource.password=Sommu@123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Server Configuration
server.port=${PORT:4000}
server.tomcat.max-http-form-post-size=10485760
server.tomcat.max-http-post-size=10485760
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# AI Microservice Configuration
ai.service.url=${AI_SERVICE_URL:http://localhost:8000}

# Mail Configuration
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE:true}
spring.mail.properties.mail.smtp.starttls.required=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_REQUIRED:true}
spring.mail.properties.mail.smtp.ssl.enable=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_SSL_ENABLE:false}
spring.mail.properties.mail.smtp.socketFactory.port=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_SOCKETFACTORY_PORT:587}
spring.mail.properties.mail.smtp.socketFactory.class=${SPRING_MAIL_PROPERTIES_MAIL_SMTP_SOCKETFACTORY_CLASS:javax.net.ssl.SSLSocketFactory}
spring.mail.properties.mail.debug=${SPRING_MAIL_DEBUG:true}

# Razorpay Configuration
payment.razorpay.enabled=${PAYMENT_RAZORPAY_ENABLED:false}
razorpay.key.id=${RAZORPAY_KEY_ID:disabled}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:disabled}

# Production CORS
app.frontend.url=${FRONTEND_URL:http://localhost:5173}

