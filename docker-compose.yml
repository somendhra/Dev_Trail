services:
  # MySQL Database
  mysql:
    image: mysql:8.4.0
    container_name: gigshield-mysql
    environment:
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD:-Sommu@123}"
      MYSQL_DATABASE: "${DB_NAME:-ai_insurance}"
    ports:
      - "${DB_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - gigshield-network
    restart: unless-stopped

  # Python AI Model Service
  ai-model:
    build:
      context: ./ai-model
      dockerfile: Dockerfile
    container_name: gigshield-ai
    environment:
      - PYTHONUNBUFFERED=1
    ports:
      - "${AI_SERVICE_PORT:-8000}:8000"
    depends_on:
      - mysql
    networks:
      - gigshield-network
    restart: unless-stopped

  # Spring Boot Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gigshield-backend
    environment:
      # Database Configuration
      SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/${DB_NAME:-ai_insurance}"
      SPRING_DATASOURCE_USERNAME: "${DB_USER:-root}"
      SPRING_DATASOURCE_PASSWORD: "${DB_PASSWORD:-Sommu@123}"
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: "com.mysql.cj.jdbc.Driver"
      
      # JPA Configuration
      SPRING_JPA_HIBERNATE_DDL_AUTO: "update"
      SPRING_JPA_SHOW_SQL: "false"
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: "org.hibernate.dialect.MySQLDialect"
      
      # Server Configuration
      PORT: "4000"
      
      # AI Service Configuration
      AI_SERVICE_URL: "http://ai-model:8000"
      
      # Frontend URL for CORS
      FRONTEND_URL: "${FRONTEND_URL:-http://localhost:5173}"
      
      # Weather Service (OpenWeatherMap) - leave empty for mock
      OWM_API_KEY: "${OWM_API_KEY:-}"
      
      # Email Configuration
      SPRING_MAIL_HOST: "${SPRING_MAIL_HOST:-smtp.gmail.com}"
      SPRING_MAIL_PORT: "${SPRING_MAIL_PORT:-587}"
      SPRING_MAIL_USERNAME: "${SPRING_MAIL_USERNAME:-gigprotectiontrails@gmail.com}"
      SPRING_MAIL_PASSWORD: "${SPRING_MAIL_PASSWORD:-kqxltwnlbhrjmvyx}"
      EMAIL_MOCK_ENABLED: "${EMAIL_MOCK_ENABLED:-true}"
      
      # Razorpay Configuration
      PAYMENT_RAZORPAY_ENABLED: "${PAYMENT_RAZORPAY_ENABLED:-true}"
      RAZORPAY_KEY_ID: "${RAZORPAY_KEY_ID:-rzp_test_Sd4v6ZZiqDCdve}"
      RAZORPAY_KEY_SECRET: "${RAZORPAY_KEY_SECRET:-bMoFeCS1a08PyVkIYaCrSV7W}"
    
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    depends_on:
      mysql:
        condition: service_healthy
      ai-model:
        condition: service_started
    networks:
      - gigshield-network
    restart: unless-stopped

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gigshield-frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    networks:
      - gigshield-network
    restart: unless-stopped

volumes:
  mysql_data:
    driver: local

networks:
  gigshield-network:
    driver: bridge
